<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.M.B FIND - سامانه هوشمند رهیابی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset و فونت */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0F2027 0%, #203A43 50%, #2C5364 100%);
            color: #fff;
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }
        
        /* اپلیکیشن مانند */
        .app-container {
            max-width: 480px;
            margin: 20px auto;
            background: #1a1a2e;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Status Bar */
        .status-bar {
            background: #16213e;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .status-time {
            font-weight: 600;
            font-size: 16px;
        }
        
        .status-icons {
            display: flex;
            gap: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* هدر */
        .app-header {
            background: linear-gradient(135deg, #16213e 0%, #0F3460 100%);
            padding: 40px 25px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .app-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: float 30s linear infinite;
        }
        
        @keyframes float {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 2;
        }
        
        .logo-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0, 180, 219, 0.4);
            border: 5px solid rgba(255, 255, 255, 0.1);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 15px 35px rgba(0, 180, 219, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 20px 40px rgba(0, 180, 219, 0.6); }
            100% { transform: scale(1); box-shadow: 0 15px 35px rgba(0, 180, 219, 0.4); }
        }
        
        .logo-circle i {
            font-size: 48px;
            color: white;
        }
        
        .app-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(45deg, #00b4db, #00dbde);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        
        .app-subtitle {
            font-size: 18px;
            opacity: 0.9;
            margin-top: 5px;
            line-height: 1.5;
        }
        
        /* محتوا */
        .app-content {
            padding: 0;
            height: 600px;
            position: relative;
        }
        
        /* صفحات */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 30px;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            overflow-y: auto;
            display: none;
        }
        
        .screen.active {
            opacity: 1;
            transform: translateX(0);
            display: block;
        }
        
        /* کارت‌ها */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .screen-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #00b4db;
        }
        
        .screen-title i {
            font-size: 32px;
        }
        
        /* ورودی‌ها */
        .input-container {
            position: relative;
            margin-bottom: 30px;
        }
        
        .input-label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .input-field {
            width: 100%;
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            color: white;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #00b4db;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(0, 180, 219, 0.2);
        }
        
        .input-hint {
            display: block;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-style: italic;
            line-height: 1.5;
            padding-right: 10px;
        }
        
        /* دکمه‌ها */
        .button-container {
            margin-top: 40px;
        }
        
        .btn {
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white;
            box-shadow: 0 10px 25px rgba(0, 180, 219, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 180, 219, 0.6);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 15px;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        /* صفحه کد پیگیری */
        .success-screen {
            text-align: center;
            padding-top: 40px;
        }
        
        .success-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin: 0 auto 40px;
            box-shadow: 0 20px 40px rgba(0, 176, 155, 0.4);
            border: 5px solid rgba(255, 255, 255, 0.1);
            animation: successPulse 2s infinite;
        }
        
        @keyframes successPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .tracking-card {
            background: linear-gradient(135deg, rgba(0, 180, 219, 0.15), rgba(0, 131, 176, 0.15));
            border: 2px solid rgba(0, 180, 219, 0.3);
            border-radius: 25px;
            padding: 40px 30px;
            margin: 40px 0;
            position: relative;
            overflow: hidden;
        }
        
        .tracking-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00b4db, #00dbde);
        }
        
        .tracking-label {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }
        
        .tracking-code {
            font-size: 48px;
            font-weight: 900;
            color: #00dbde;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
            direction: ltr;
            text-shadow: 0 5px 15px rgba(0, 219, 222, 0.3);
        }
        
        .message-card {
            background: rgba(255, 255, 255, 0.05);
            border-right: 5px solid #00dbde;
            padding: 25px;
            border-radius: 20px;
            margin: 30px 0;
            text-align: right;
        }
        
        .message-card h3 {
            color: #00b4db;
            margin-bottom: 15px;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .message-card p {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            margin-bottom: 12px;
        }
        
        /* نوار پایین */
        .bottom-nav {
            position: sticky;
            bottom: 0;
            background: rgba(22, 33, 62, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
        }
        
        .nav-button {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(0, 180, 219, 0.4);
            transition: all 0.3s;
        }
        
        .nav-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 180, 219, 0.6);
        }
        
        /* دایره‌های متحرک */
        .floating-circles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 180, 219, 0.1), transparent);
            animation: floatAround 20s infinite linear;
        }
        
        .circle:nth-child(1) { width: 100px; height: 100px; top: 10%; left: 10%; animation-delay: 0s; }
        .circle:nth-child(2) { width: 150px; height: 150px; bottom: 20%; right: 10%; animation-delay: -5s; }
        .circle:nth-child(3) { width: 80px; height: 80px; top: 50%; left: 20%; animation-delay: -10s; }
        .circle:nth-child(4) { width: 120px; height: 120px; bottom: 10%; left: 30%; animation-delay: -15s; }
        
        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(50px, 50px) rotate(90deg); }
            50% { transform: translate(100px, 0) rotate(180deg); }
            75% { transform: translate(50px, -50px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        
        /* استپ‌ها */
        .steps {
            display: flex;
            justify-content: space-between;
            margin: 30px 0 50px;
            position: relative;
            padding: 0 20px;
        }
        
        .steps::before {
            content: '';
            position: absolute;
            top: 25px;
            right: 70px;
            left: 70px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1;
        }
        
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        
        .step-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-bottom: 10px;
            border: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .step.active .step-circle {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0, 180, 219, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .step-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }
        
        .step.active .step-label {
            color: #00b4db;
            font-weight: 600;
        }
        
        /* اسکرول بار */
        .screen::-webkit-scrollbar {
            width: 6px;
        }
        
        .screen::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .screen::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            border-radius: 10px;
        }
        
        /* رسپانسیو */
        @media (max-width: 500px) {
            .app-container {
                margin: 10px;
                border-radius: 20px;
            }
            
            .app-content {
                height: 500px;
            }
            
            .tracking-code {
                font-size: 36px;
            }
            
            .screen {
                padding: 25px;
            }
        }
        
        /* انیمیشن‌های متن */
        .typing-text {
            overflow: hidden;
            border-right: 3px solid #00b4db;
            white-space: nowrap;
            animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
        }
        
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
        
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #00b4db }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Status Bar شبیه گوشی -->
        <div class="status-bar">
            <div class="status-time" id="currentTime">۱۲:۰۰</div>
            <div class="status-icons">
                <i class="fas fa-wifi"></i>
                <i class="fas fa-signal"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>
        
        <!-- هدر -->
        <div class="app-header">
            <div class="logo-container">
                <div class="logo-circle">
                    <i class="fas fa-search-location"></i>
                </div>
                <h1 class="app-title">A.M.B FIND</h1>
                <p class="app-subtitle">سامانه هوشمند رهیابی گوشی‌های مفقودی و مسروقه</p>
            </div>
        </div>
        
        <!-- دایره‌های متحرک -->
        <div class="floating-circles">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
        
        <!-- محتوای اصلی -->
        <div class="app-content">
            <!-- صفحه ۱: ثبت IMEI -->
            <div class="screen active" id="screen1">
                <div class="steps">
                    <div class="step active">
                        <div class="step-circle">1</div>
                        <div class="step-label">ثبت IMEI</div>
                    </div>
                    <div class="step">
                        <div class="step-circle">2</div>
                        <div class="step-label">اطلاعات</div>
                    </div>
                    <div class="step">
                        <div class="step-circle">3</div>
                        <div class="step-label">کد پیگیری</div>
                    </div>
                </div>
                
                <div class="card">
                    <h2 class="screen-title">
                        <i class="fas fa-mobile-alt"></i>
                        ثبت شماره IMEI
                    </h2>
                    
                    <p style="color: rgba(255,255,255,0.8); margin-bottom: 30px; line-height: 1.6;">
                        لطفاً شماره IMEI گوشی را وارد کنید. این شماره یک کد ۱۵ رقمی منحصر به فرد است.
                    </p>
                    
                    <div class="input-container">
                        <label class="input-label">
                            <i class="fas fa-fingerprint"></i>
                            شماره IMEI گوشی
                        </label>
                        <input type="text" 
                               class="input-field" 
                               id="imeiInput"
                               placeholder="123456789012345"
                               maxlength="15"
                               inputmode="numeric"
                               autocomplete="off">
                        <span class="input-hint">
                            <i class="fas fa-info-circle"></i>
                            برای پیدا کردن IMEI: *#06# را شماره‌گیری کنید
                        </span>
                    </div>
                </div>
                
                <div class="button-container">
                    <button class="btn btn-primary" onclick="nextToScreen2()">
                        ادامه
                        <i class="fas fa-arrow-left"></i>
                    </button>
                </div>
            </div>
            
            <!-- صفحه ۲: اطلاعات شخصی -->
            <div class="screen" id="screen2">
                <div class="steps">
                    <div class="step">
                        <div class="step-circle">1</div>
                        <div class="step-label">ثبت IMEI</div>
                    </div>
                    <div class="step active">
                        <div class="step-circle">2</div>
                        <div class="step-label">اطلاعات</div>
                    </div>
                    <div class="step">
                        <div class="step-circle">3</div>
                        <div class="step-label">کد پیگیری</div>
                    </div>
                </div>
                
                <div class="card">
                    <h2 class="screen-title">
